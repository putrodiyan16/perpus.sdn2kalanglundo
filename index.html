<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Perpustakaan Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="container-logo">
            <img src="https://lh3.googleusercontent.com/d/19bwBwyr7-aFsOFdtCH3aofJyp8irU7Sy" alt="Logo Sekolah" class="logo-sekolah">
        </div>

        <h1>PERPUSTAKAAN</h1>
        <h2>SDN 2 KALANGLUNDO</h2>
        <p class="motto">"Membaca Jendela Dunia"</p>

        <div id="menu-utama" class="menu-grid">
            <button class="btn-menu" onclick="tampilkanHalaman('halaman-registrasi')">
                <span class="icon">📝</span>
                <span>Registrasi Siswa</span>
            </button>
            <button class="btn-menu" onclick="tampilkanHalaman('halaman-kedatangan')">
                <span class="icon">📸</span>
                <span>Kedatangan (Scan)</span>
            </button>
            <button class="btn-menu" onclick="tampilkanHalaman('halaman-pinjam')">
                <span class="icon">📚</span>
                <span>Pinjam Buku</span>
            </button>
        </div>

        <div id="halaman-registrasi" class="halaman hidden">
            <h2>Registrasi Siswa Baru</h2>
            <input type="text" id="namaSiswa" placeholder="Nama Lengkap Siswa">
            <input type="text" id="kelasSiswa" placeholder="Kelas (Contoh: 10 IPA 1)">
            <button id="btnSimpan" class="btn-aksi">Simpan ke Supabase</button>
            <button class="btn-back" onclick="kembaliKeMenu()">⬅ Kembali</button>
        </div>

        <div id="halaman-kedatangan" class="halaman hidden">
            <h2>Scan Barcode Kedatangan</h2>
            <div id="reader" style="width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px;"></div>
            <div id="hasil-scan" style="margin-bottom: 15px; font-weight: bold; color: #2ecc71;"></div>
            <button class="btn-back" onclick="kembaliKeMenu()">⬅ Kembali</button>
        </div>

        <div id="halaman-pinjam" class="halaman hidden">
            <h2>Peminjaman Buku</h2>
            <div class="placeholder-fitur">Fitur Peminjaman sedang disiapkan...</div>
            <button class="btn-back" onclick="kembaliKeMenu()">⬅ Kembali</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="app.js"></script>
</body>
</html>
